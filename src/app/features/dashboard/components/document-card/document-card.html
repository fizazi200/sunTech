<div class="group relative bg-white border border-gray-200 rounded-xl shadow-sm hover:shadow-lg transition-all duration-300 overflow-hidden cursor-pointer h-full flex flex-col"
    (click)="view.emit(document.id)">
    <!-- Thumbnail Area / Header -->
    <div
        class="h-32 bg-gradient-to-br from-blue-50 to-indigo-50 flex items-center justify-center relative group-hover:from-blue-100 group-hover:to-indigo-100 transition-colors">
        <div class="text-4xl text-indigo-300">
            📄
        </div>

        <!-- Hover Actions Overlay -->
        <div
            class="absolute inset-0 bg-black/40 opacity-0 group-hover:opacity-100 transition-opacity flex items-center justify-center gap-2 backdrop-blur-sm">
            <button (click)="onView($event)"
                class="bg-white text-gray-900 px-4 py-2 rounded-lg text-sm font-medium hover:bg-gray-50 flex items-center gap-2 transform translate-y-2 group-hover:translate-y-0 transition-all duration-300">
                <span>👁️</span> Preview
            </button>
            <button (click)="onEdit($event)"
                class="bg-indigo-600 text-white px-4 py-2 rounded-lg text-sm font-medium hover:bg-indigo-700 flex items-center gap-2 transform translate-y-2 group-hover:translate-y-0 transition-all duration-300 delay-75">
                <span>✏️</span> Edit
            </button>
            <button (click)="onDownload($event)"
                class="bg-green-600 text-white px-4 py-2 rounded-lg text-sm font-medium hover:bg-green-700 flex items-center gap-2 transform translate-y-2 group-hover:translate-y-0 transition-all duration-300 delay-100">
                <span>⬇️</span> PDF
            </button>
        </div>
    </div>

    <!-- Content -->
    <div class="p-5 flex-1 flex flex-col">
        <h3 class="text-lg font-semibold text-gray-900 mb-1 group-hover:text-indigo-600 transition-colors">{{
            document.title }}</h3>
        <p class="text-sm text-gray-500 mb-4 line-clamp-2 flex-1">{{ document.description }}</p>

        <div class="flex items-center justify-between mt-auto pt-4 border-t border-gray-50">
            <span class="text-xs text-gray-400">Updated {{ document.updatedAt | date:'MMM d, y' }}</span>
            <div class="flex -space-x-2">
                <!-- Avatars placeholders if needed, or just status -->
                <span class="w-2 h-2 rounded-full bg-green-500" title="Active"></span>
            </div>
        </div>
    </div>
</div>
