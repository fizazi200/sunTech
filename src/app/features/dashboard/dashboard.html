<main class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 py-8">
  <div class="flex items-center justify-between mb-8">
    <div>
      <h2 class="text-2xl font-bold text-gray-900">My Documents</h2>
      <p class="text-gray-500 mt-1">Manage all your document templates and forms from here. ({{
          documents.length }} items)</p>
    </div>
    <button (click)="createNewDocument()"
            class="bg-indigo-600 text-white px-5 py-2.5 rounded-xl font-medium hover:bg-indigo-700 shadow-sm hover:shadow-md transition-all flex items-center gap-2 active:scale-95">
      <span>＋</span> New Document
    </button>
  </div>

  <!-- Document Grid -->
  <div class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 xl:grid-cols-4 gap-6">
    <!-- Create New Card (optional visual cue) -->
    <div (click)="createNewDocument()"
         class="group border-2 border-dashed border-gray-300 rounded-xl p-6 flex flex-col items-center justify-center bg-gray-50 hover:bg-white hover:border-indigo-400 hover:shadow-sm cursor-pointer transition-all min-h-[280px]">
      <div
        class="w-16 h-16 bg-gray-100 rounded-full flex items-center justify-center mb-4 group-hover:bg-indigo-50 transition-colors">
        <span class="text-3xl text-gray-400 group-hover:text-indigo-600 transition-colors">＋</span>
      </div>
      <span class="text-gray-500 font-medium group-hover:text-indigo-600">Create New Template</span>
    </div>

    <!-- Existing Documents -->
    <app-document-card *ngFor="let doc of documents" [document]="doc" (view)="previewDocument($event)"
                       (edit)="navigateToEditor($event)" (download)="downloadDocument($event)"></app-document-card>
  </div>
</main>
